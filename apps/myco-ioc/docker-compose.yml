services:
  bus:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  node:
    build: ./node
    restart: unless-stopped
    depends_on:
      bus:
        condition: service_healthy
    environment:
      NATS_URL: nats://bus:4222
      # NODE_ID is optional; will default to container hostname
      WINDOW_MS: "5000"
      THRESH: "20"
      BLOCK_TTL_SEC: "180"
      BAD_PATHS: "/wp-login.php,/xmlrpc.php,/admin/login"
      BAD_STATUS: "401,403"

  controller:
    build: ./controller
    restart: unless-stopped
    depends_on:
      bus:
        condition: service_healthy
    environment:
      NATS_URL: nats://bus:4222
      QUORUM: "1"
      DEFAULT_TTL_SEC: "180"
      HTTP_PORT: "3000"
    ports:
      - "3000:3000"  # Interface web + WebSocket

  traffic:
    build: ./traffic
    restart: unless-stopped
    depends_on:
      bus:
        condition: service_healthy
    environment:
      NATS_URL: nats://bus:4222

  natsbox:
    image: synadia/nats-box
    restart: unless-stopped
    depends_on:
      bus:
        condition: service_healthy
    entrypoint: ["/bin/sh","-lc","sleep infinity"]
